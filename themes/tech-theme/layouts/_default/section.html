{{ define "main" }}
<div class="posts-list">
    {{ range .Pages }}
    <article class="post-item">
        <div class="post-header">
            <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
            {{ with .Params.original_url }}
            <a href="{{ . }}" target="_blank" class="original-link-btn">原文链接 ↗</a>
            {{ end }}
        </div>
        {{ with .Params.categories }}
        <span class="category-badge category-{{ index . 0 | lower }}">
            {{ index . 0 }}
        </span>
        {{ end }}
        <p class="post-brief">{{ .Summary | plainify | htmlUnescape }}</p>
    </article>
    {{ end }}
</div>
{{ end }}
