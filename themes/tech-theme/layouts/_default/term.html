{{ define "main" }}
<h1>标签: {{ .Title }}</h1>
<div class="posts-grid">
  {{ range .Pages }}
  <article class="post-card">
    {{ with .Params.category }}
    <span class="category-badge category-{{ . | lower }}">
      {{ . }}
    </span>
    {{ end }}
    <h2><a href="{{ .RelPermalink }}">{{ .Title }}</a></h2>
    <div class="post-meta">
      <time>{{ .Date.Format "2006-01-02" }}</time>
      {{ with .Params.tags }}
      <div class="post-tags">
        {{ range . }}
        <span>{{ . }}</span>
        {{ end }}
      </div>
      {{ end }}
    </div>
    <p class="post-summary">{{ .Summary }}</p>
  </article>
  {{ end }}
</div>
{{ end }}
